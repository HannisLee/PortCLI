name: Release

on:
  push:
    tags: ['v*']

env:
  CARGO_TERM_COLOR: always

jobs:
  build-windows:
    name: Build Windows (GUI)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Build Tauri GUI
        run: cargo build --release -p porthannis-gui

      - name: Prepare artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path upload | Out-Null
          Copy-Item target/release/porthannis-gui.exe upload/PortHannis.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifact
          path: upload/PortHannis.exe

  build-linux:
    name: Build Linux (CLI)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Build CLI
        run: cargo build --release -p porthannis-server

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifact
          path: target/release/porthannis

  create-release:
    name: Create GitHub Release
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: '*-artifact'
          merge-multiple: true

      - name: Generate release notes
        run: |
          cat > release-notes.md << 'EOF'
          ## PortHannis ${{ github.ref_name }}

          ### Windows
          下载 **PortHannis.exe**，双击运行即可打开 GUI 管理界面。

          ### Linux / Ubuntu
          下载 `porthannis`，终端命令行管理端口转发：
          ```bash
          chmod +x porthannis
          ./porthannis list                    # 查看转发条目
          ./porthannis add -n "MySQL" -s 3306 -a 10.0.0.1 -t 3306
          ./porthannis start <ID>              # 启动转发
          ./porthannis serve                   # 启动 Web 管理界面
          ```

          配置文件 `port.json` 首次运行时自动创建于用户主目录。
          EOF

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          files: |
            PortHannis.exe
            porthannis
